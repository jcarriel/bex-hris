<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#1e40af" rx="20"/>
  
  <!-- People/Organization icon (stylized) -->
  <g fill="#ffffff">
    <!-- Head 1 (top left) -->
    <circle cx="28" cy="25" r="8"/>
    <!-- Body 1 -->
    <rect x="24" y="35" width="8" height="15" rx="2"/>
    
    <!-- Head 2 (top center) -->
    <circle cx="50" cy="20" r="9"/>
    <!-- Body 2 (larger - manager/center) -->
    <rect x="45" y="32" width="10" height="18" rx="2"/>
    
    <!-- Head 3 (top right) -->
    <circle cx="72" cy="25" r="8"/>
    <!-- Body 3 -->
    <rect x="68" y="35" width="8" height="15" rx="2"/>
    
    <!-- Connection lines (hierarchy) -->
    <line x1="50" y1="50" x2="28" y2="50" stroke="#ffffff" stroke-width="2"/>
    <line x1="50" y1="50" x2="72" y2="50" stroke="#ffffff" stroke-width="2"/>
    
    <!-- Document/Chart icon (bottom) -->
    <rect x="35" y="60" width="30" height="25" rx="2" fill="none" stroke="#ffffff" stroke-width="2"/>
    <line x1="40" y1="70" x2="60" y2="70" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="40" y1="77" x2="60" y2="77" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="40" y1="84" x2="55" y2="84" stroke="#ffffff" stroke-width="1.5"/>
  </g>
</svg>
